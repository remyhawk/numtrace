<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NumTrace Dashboard</title>

<style>
:root{
  --bg:#070a12;
  --panel:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --text:#eaf0ff;
  --muted:rgba(234,240,255,0.65);
  --accent:#4f8cff;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial;
background:var(--bg);
color:var(--text);
display:flex;
min-height:100vh;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:rgba(255,255,255,0.03);
border-right:1px solid var(--border);
padding:18px;
}

.brand{
font-weight:700;
margin-bottom:18px;
}

.navItem{
padding:10px 12px;
border-radius:10px;
margin-bottom:6px;
cursor:pointer;
color:var(--muted);
transition:.2s;
}

.navItem:hover{
background:rgba(255,255,255,0.05);
color:white;
}

.navItem.active{
background:rgba(79,140,255,0.15);
border:1px solid rgba(79,140,255,0.3);
color:white;
}

/* MAIN */
.main{
flex:1;
padding:26px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

.title{
font-size:20px;
font-weight:600;
}

/* QUICK ACCESS BAR */
.quick{
display:flex;
gap:10px;
margin-bottom:18px;
}

.quick button{
padding:10px 12px;
border-radius:10px;
border:none;
background:rgba(79,140,255,0.15);
color:white;
cursor:pointer;
}

/* CARD */
.card{
background:var(--panel);
border:1px solid var(--border);
border-radius:16px;
padding:16px;
margin-bottom:14px;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid var(--border);
background:#0c1020;
color:var(--text);
margin-top:10px;
}

button.primary{
margin-top:10px;
padding:12px 14px;
border:none;
border-radius:12px;
background:var(--accent);
color:white;
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

@media(max-width:900px){
.sidebar{display:none}
.grid{grid-template-columns:1fr}
}

/* METRICS */
.metric{
padding:14px;
border-radius:14px;
background:rgba(255,255,255,0.03);
border:1px solid var(--border);
}

.label{font-size:12px;color:var(--muted)}
.value{margin-top:6px;font-weight:600}

/* VIEWS */
.view{display:none}
.view.active{display:block}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="brand">NumTrace</div>

<div class="navItem active" onclick="show('dashboard',this)">Dashboard</div>
<div class="navItem" onclick="show('lookup',this)">Lookup</div>
<div class="navItem" onclick="show('history',this)">History</div>
<div class="navItem" onclick="show('billing',this)">Billing</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<div class="title" id="title">Dashboard</div>
</div>

<!-- QUICK ACCESS (IMPORTANT FIX) -->
<div class="quick">
<button onclick="show('lookup',document.querySelectorAll('.navItem')[1])">
Quick Lookup
</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="view active">
<div class="card">
<h3>System Overview</h3>
<p style="color:var(--muted)">
Welcome. Use Quick Lookup or sidebar to analyze numbers.
</p>
</div>

<div class="card">
<p style="color:var(--muted)">
Recent activity will appear here once searches are made.
</p>
</div>
</div>

<!-- LOOKUP -->
<div id="lookup" class="view">

<div class="card">
<h3>Phone Lookup</h3>
<input id="num" placeholder="Enter phone number">
<button class="primary" onclick="run()">Analyze Number</button>
</div>

<div id="out" class="card" style="display:none"></div>

</div>

<!-- HISTORY -->
<div id="history" class="view">
<div class="card">
<h3>Search History</h3>
<p style="color:var(--muted)">No searches yet.</p>
</div>
</div>

<!-- BILLING -->
<div id="billing" class="view">
<div class="card">
<h3>Billing</h3>
<p style="color:var(--muted)">Upgrade system not connected yet.</p>
</div>
</div>

</div>

<script>

function show(id,el){

document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
document.getElementById(id).classList.add('active');

document.querySelectorAll('.navItem').forEach(n=>n.classList.remove('active'));
if(el) el.classList.add('active');

document.getElementById('title').innerText =
id.charAt(0).toUpperCase()+id.slice(1);
}

function hash(s){
let h=0;
for(let i=0;i<s.length;i++){
h=(h<<5)-h+s.charCodeAt(i);
h|=0;
}
return Math.abs(h);
}

function run(){
const v=document.getElementById("num").value;
if(!v)return;

const carriers=["Verizon","AT&T","T-Mobile","Mint Mobile","Vodafone"];
const types=["Mobile","Landline","VoIP"];

const s=hash(v);

const data={
carrier:carriers[s%carriers.length],
type:types[s%types.length],
risk:s%100
};

document.getElementById("out").style.display="block";
document.getElementById("out").innerHTML=`

<div class="grid">

<div class="metric">
<div class="label">Carrier</div>
<div class="value">${data.carrier}</div>
</div>

<div class="metric">
<div class="label">Line Type</div>
<div class="value">${data.type}</div>
</div>

<div class="metric">
<div class="label">Risk Score</div>
<div class="value">${data.risk}/100</div>
</div>

</div>

`;
}
</script>

</body>
</html>
