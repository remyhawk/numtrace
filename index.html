<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NumTrace</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f1a;color:white}
.nav{display:flex;justify-content:space-between;padding:14px;background:#0f1629}
.nav a{color:#aaa;margin-left:10px;text-decoration:none}
.container{max-width:900px;margin:auto;padding:30px}
.card{background:#121a2b;padding:16px;border-radius:12px;margin-top:12px}
h1{background:linear-gradient(90deg,#4f8cff,#8a5cff);
-webkit-background-clip:text;-webkit-text-fill-color:transparent}
input{width:100%;padding:12px;border-radius:10px;border:none;margin-top:10px}
button{width:100%;margin-top:10px;padding:12px;border:none;border-radius:10px;background:#4f8cff;color:white}
.badge{display:inline-block;padding:6px 10px;background:#24314f;margin:4px;border-radius:8px}
.page{display:none}
.active{display:block}
</style>
</head>

<body>

<div class="nav">
<b>NumTrace</b>
<div>
<a onclick="go('home')">Home</a>
<a onclick="go('lookup')">Lookup</a>
<a onclick="go('pricing')">Pricing</a>
</div>
</div>

<div id="home" class="page active container">
<h1>Phone Intelligence Engine</h1>
<p>Carrier + spam + line detection</p>
</div>

<div id="lookup" class="page container">
<div class="card">
<h3>Lookup</h3>
<input id="num" placeholder="Enter number">
<button onclick="run()">Search</button>
</div>

<div id="out" class="card" style="display:none"></div>
</div>

<div id="pricing" class="page container">
<div class="card">Free - 5 searches</div>
<div class="card">Pro - $9.99</div>
<div class="card">Business - $29.99</div>
</div>

<script>
function go(p){
document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'))
document.getElementById(p).classList.add('active')
}

function h(s){let x=0;for(let i=0;i<s.length;i++){x=(x<<5)-x+s.charCodeAt(i)}return Math.abs(x)}

function run(){
const v=document.getElementById('num').value
if(!v)return

const c=["Verizon","AT&T","T-Mobile","Mint"]
const t=["Mobile","Landline","VoIP"]
const s=h(v)

const r={
carrier:c[s%c.length],
type:t[s%t.length],
risk:s%100
}

document.getElementById('out').style.display="block"
document.getElementById('out').innerHTML=
`<div class="badge">Carrier: ${r.carrier}</div>
<div class="badge">Type: ${r.type}</div>
<div class="badge">Risk: ${r.risk}/100</div>`
}
</script>

</body>
</html>
