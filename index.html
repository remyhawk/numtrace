<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NumTrace</title>

<style>
:root{
  --bg:#070a12;
  --panel:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --text:#e9ecf1;
  --muted:rgba(233,236,241,0.65);
  --accent1:#4f8cff;
  --accent2:#8a5cff;
  --good:#2dd4bf;
  --warn:#fbbf24;
  --bad:#fb7185;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial;
background:
radial-gradient(1200px 600px at 20% 0%, #16213a 0%, transparent 60%),
radial-gradient(900px 500px at 80% 20%, #1a1233 0%, transparent 55%),
var(--bg);
color:var(--text);
}

.container{
max-width:980px;
margin:auto;
padding:42px 18px;
}

/* TOP BAR */
.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
position:sticky;
top:0;
backdrop-filter: blur(14px);
background:rgba(10,12,20,0.6);
border-bottom:1px solid var(--border);
z-index:10;
}

.brand{
font-weight:700;
letter-spacing:0.4px;
}

.pill{
font-size:12px;
padding:4px 10px;
border:1px solid var(--border);
border-radius:999px;
color:var(--muted);
}

/* HERO */
.hero{
text-align:center;
padding:60px 10px 30px;
}

h1{
font-size:46px;
margin:0;
letter-spacing:-0.8px;
background:linear-gradient(90deg,var(--accent1),var(--accent2));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
margin-top:10px;
color:var(--muted);
font-size:15px;
}

/* SEARCH CARD */
.card{
background:var(--panel);
border:1px solid var(--border);
border-radius:18px;
padding:18px;
box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

.searchWrap{
display:flex;
gap:10px;
margin-top:12px;
}

input{
flex:1;
padding:14px 14px;
border-radius:12px;
border:1px solid var(--border);
background:#0c1020;
color:var(--text);
outline:none;
font-size:14px;
}

button{
padding:14px 16px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
color:white;
background:linear-gradient(90deg,var(--accent1),var(--accent2));
transition:transform .15s ease;
}

button:active{
transform:scale(0.98);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:16px;
}

@media(max-width:700px){
.grid{grid-template-columns:1fr}
}

.metric{
background:rgba(255,255,255,0.03);
border:1px solid var(--border);
border-radius:14px;
padding:14px;
}

.metric .label{
font-size:12px;
color:var(--muted);
}

.metric .value{
font-size:16px;
margin-top:6px;
font-weight:600;
}

/* STATUS */
.badge{
display:inline-flex;
align-items:center;
gap:6px;
padding:6px 10px;
border-radius:999px;
font-size:12px;
border:1px solid var(--border);
margin-right:6px;
margin-top:6px;
}

.dot{
width:6px;height:6px;border-radius:50%;
}

.good{background:rgba(45,212,191,0.1);color:var(--good)}
.warn{background:rgba(251,191,36,0.1);color:var(--warn)}
.bad{background:rgba(251,113,133,0.1);color:var(--bad)}

.sectionTitle{
margin-top:18px;
font-size:13px;
color:var(--muted);
text-transform:uppercase;
letter-spacing:1px;
}

/* RESULT */
.result{
margin-top:18px;
display:none;
}

.fade{
animation:fade .25s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(6px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<div class="nav">
<div class="brand">NumTrace</div>
<div class="pill">Intelligence Platform</div>
</div>

<div class="container">

<div class="hero">
<h1>Phone Intelligence Engine</h1>
<div class="sub">Carrier analysis • Risk scoring • Line intelligence</div>
</div>

<div class="card">
<div class="searchWrap">
<input id="num" placeholder="Enter phone number (e.g. +1 813 555 0192)">
<button onclick="run()">Analyze</button>
</div>

<div class="result card fade" id="out"></div>
</div>

</div>

<script>
function hash(s){
let h=0;
for(let i=0;i<s.length;i++){
h=(h<<5)-h+s.charCodeAt(i);
h|=0;
}
return Math.abs(h);
}

function riskBadge(score){
if(score>70) return "bad";
if(score>40) return "warn";
return "good";
}

function run(){
const v=document.getElementById("num").value;
if(!v) return;

const carriers=["Verizon","AT&T","T-Mobile","Mint Mobile","Vodafone"];
const types=["Mobile","Landline","VoIP"];

const s=hash(v);

const data={
carrier:carriers[s%carriers.length],
type:types[s%types.length],
risk:s%100
};

const level =
data.risk>70?"High Risk":
data.risk>40?"Medium Risk":"Low Risk";

document.getElementById("out").style.display="block";
document.getElementById("out").innerHTML=`

<div class="sectionTitle">Intelligence Report</div>

<div class="grid">
<div class="metric">
<div class="label">Carrier</div>
<div class="value">${data.carrier}</div>
</div>

<div class="metric">
<div class="label">Line Type</div>
<div class="value">${data.type}</div>
</div>

<div class="metric">
<div class="label">Risk Score</div>
<div class="value">${data.risk}/100</div>
</div>
</div>

<div class="sectionTitle">Status</div>

<div class="badge ${riskBadge(data.risk)}">
<div class="dot"></div>
${level}
</div>

<div class="badge">
Verified Dataset Simulation
</div>

`;
}
</script>

</body>
</html>
